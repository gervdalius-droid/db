<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FabFlow — Administravimas (peržiūra)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* — self-contained: light theme tokens + only the bits the console uses — */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Sora',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --bg:#f4f3ef;--surface:#fff;--surface2:#f9f8f5;--surface3:#f0efe9;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1916;--muted:#6b6860;--hint:#a8a49c;
  --blue:#2563eb;--blue-t:#1d4ed8;--blue-bg:#eff6ff;
  --green-bg:#f0fdf4;--green-t:#15803d;--amber-bg:#fffbeb;--amber-t:#b45309;
  --red-bg:#fef2f2;--red-t:#b91c1c;--purple:#7c3aed;
  --r:12px;--rl:16px;--rxl:22px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 8px 24px rgba(0,0,0,.08);--sh3:0 24px 60px rgba(0,0,0,.16);
}
body{font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:10px;font-family:var(--font);font-size:13.5px;font-weight:600;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-danger{color:var(--red-t);border-color:var(--red-t)}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;text-decoration:none;color:var(--text)}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px}
.pill.green{background:var(--green-bg);color:var(--green-t)}.pill.amber{background:var(--amber-bg);color:var(--amber-t)}
.pill.red{background:var(--red-bg);color:var(--red-t)}.pill.grey{background:var(--surface3);color:var(--muted)}
input,select{font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;outline:none}
.mono{font-family:var(--mono)}
.topbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:60px;max-width:1200px;margin:0 auto;padding:0 22px}
.topbar .who{margin-left:auto;font-size:13px;color:var(--muted)}
.page{max-width:1200px;margin:0 auto;padding:24px 22px 60px}
.demo{background:#fef9c3;color:#854d0e;text-align:center;font-size:12.5px;font-weight:600;padding:7px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat .n{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:12px;color:var(--muted);margin-top:6px}
.stat.accent{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:0}
.stat.accent .l{color:rgba(255,255,255,.85)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:200px}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
th,td{text-align:left;padding:12px 14px;font-size:13.5px;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);font-weight:600;background:var(--surface2)}
tbody tr{cursor:pointer}tbody tr:hover{background:var(--surface2)}
td .mono{font-size:12px;color:var(--muted)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none}.scrim.show{display:block}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,100%);background:var(--bg);z-index:61;box-shadow:var(--sh3);transform:translateX(100%);transition:transform .2s;overflow-y:auto;padding:24px}
.drawer.show{transform:none}
.drawer h2{font-size:22px;letter-spacing:-.02em}
.drawer .close{position:absolute;top:18px;right:18px;font-size:22px;background:none;border:0;color:var(--muted);cursor:pointer}
.act{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:12px}
.act h4{font-size:14px;margin-bottom:4px}.act p{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.act .row2{display:flex;gap:8px;align-items:center}
.danger-zone{border-color:var(--red-t)}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:7px 0;border-bottom:1px dashed var(--border)}
.kv .k{color:var(--muted)}
details summary{cursor:pointer;font-size:13px;color:var(--muted);padding:8px 0}
.log-item{font-size:12.5px;color:var(--muted);padding:6px 0;border-bottom:1px dashed var(--border)}
.log-item b{color:var(--text)}
h3{font-size:18px}
</style>
</head>
<body>
<div class="demo">PERŽIŪRA · demonstraciniai duomenys (tikras langas reikalauja prisijungimo)</div>
<div class="topbar"><div class="wrap">
  <a class="brand" href="#"><span class="logo">F</span> Administravimas</a>
  <div class="who">gervdalius@gmail.com · <span style="color:var(--blue)">Atsijungti</span></div>
</div></div>

<div class="page">
  <div class="stats" id="stats"></div>
  <h3 style="margin:0 0 12px">Klientai</h3>
  <div class="toolbar">
    <input placeholder="Ieškoti pagal pavadinimą, kodą ar el. paštą…" value="">
    <select><option>Visi statusai</option><option>Aktyvūs</option><option>Bandymas</option><option>Vėluoja mokėjimas</option></select>
    <button class="btn">↻ Atnaujinti</button>
  </div>
  <table>
    <thead><tr><th>Įmonė</th><th>Kodas</th><th>Vadovas</th><th>Planas</th><th>Statusas</th><th>Galioja iki</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div style="text-align:center;margin-top:14px;color:var(--hint);font-size:13px">Rodoma 6 iš 6</div>

  <h3 style="margin:30px 0 12px">Paskutiniai veiksmai</h3>
  <div class="card" id="activity"></div>
</div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
function planName(p){ return p==="suite"?"FabFlow (abu)":p==="nesting"?"Nesting":p==="db"?"DB":"—"; }
var STATUS={active:["green","Aktyvi"],trialing:["green","Bandymas"],past_due:["amber","Vėluoja"],unpaid:["red","Neapmokėta"],canceled:["red","Atšaukta"],none:["grey","Be plano"]};
function pill(o){ if(o.comp) return '<span class="pill green">Nemokama</span>'; var m=STATUS[o.status]||["grey",o.status]; return '<span class="pill '+m[0]+'">'+m[1]+'</span>'; }
function d(s){ return new Date(s).toLocaleDateString("lt-LT"); }
function dt(s){ return new Date(s).toLocaleString("lt-LT"); }

var ORGS=[
  {workspace_code:"GVS01",name:"Dėdės Baldai",owner_email:"vadovas@dedesbaldai.lt",plan:"suite",billing_interval:"year",apps:["nesting","db"],status:"active",comp:true,current_period_end:null,trial_end:null,created_at:"2025-09-12"},
  {workspace_code:"MEDST",name:"UAB Medžio Studija",owner_email:"info@medziostudija.lt",plan:"suite",billing_interval:"month",apps:["nesting","db"],status:"active",comp:false,current_period_end:"2026-07-14",created_at:"2026-02-03"},
  {workspace_code:"BALTK",name:"Baltic Kitchens",owner_email:"orders@baltickitchens.eu",plan:"db",billing_interval:"month",apps:["db"],status:"trialing",comp:false,trial_end:"2026-07-05",current_period_end:"2026-07-05",created_at:"2026-06-21"},
  {workspace_code:"NERIS",name:"Neris Mebel",owner_email:"a.petrauskas@neris.lt",plan:"nesting",billing_interval:"year",apps:["nesting"],status:"active",comp:false,current_period_end:"2027-01-09",created_at:"2026-01-09"},
  {workspace_code:"VILMA",name:"Vilma Interjeras",owner_email:"vilma@interjeras.lt",plan:"suite",billing_interval:"month",apps:["nesting","db"],status:"past_due",comp:false,current_period_end:"2026-06-26",created_at:"2025-12-15"},
  {workspace_code:"SKR22",name:"Skrynia Workshop",owner_email:"labas@skrynia.lt",plan:"db",billing_interval:"month",apps:[],status:"canceled",comp:false,current_period_end:"2026-06-01",created_at:"2025-11-02"}
];
var ACTIVITY=[
  {at:"2026-06-28T09:14:00",action:"grant_free_access",workspace_code:"GVS01",admin_email:"gervdalius@gmail.com"},
  {at:"2026-06-27T16:40:00",action:"extend_access",workspace_code:"BALTK",admin_email:"gervdalius@gmail.com"},
  {at:"2026-06-26T11:05:00",action:"cancel_subscription",workspace_code:"SKR22",admin_email:"gervdalius@gmail.com"},
  {at:"2026-06-24T08:22:00",action:"set_owner_password",workspace_code:"NERIS",admin_email:"gervdalius@gmail.com"}
];
function actionLabel(a){return ({grant_free_access:"Suteikta nemokama prieiga",revoke_free_access:"Atšaukta nemokama prieiga",extend_access:"Pratęsta prieiga",cancel_subscription:"Atšaukta prenumerata",set_owner_password:"Pakeistas slaptažodis",manual_override:"Rankinis koregavimas",delete_org:"Pašalintas klientas"})[a]||a;}

// stats
var cards=[{n:6,l:"Klientai"},{n:3,l:"Aktyvūs"},{n:1,l:"Bandymai"},{n:1,l:"Vėluoja"},{n:1,l:"Nemokami"},{n:"€187",l:"MRR (per mėn.)",accent:true}];
document.getElementById("stats").innerHTML=cards.map(function(c){return '<div class="stat'+(c.accent?' accent':'')+'"><div class="n">'+c.n+'</div><div class="l">'+c.l+'</div></div>';}).join("");
// table
document.getElementById("rows").innerHTML=ORGS.map(function(o){return '<tr onclick="openDrawer(\''+o.workspace_code+'\')"><td>'+o.name+'</td><td class="mono">'+o.workspace_code+'</td><td class="mono">'+o.owner_email+'</td><td>'+planName(o.plan)+'</td><td>'+pill(o)+'</td><td>'+(o.current_period_end||o.trial_end?d(o.current_period_end||o.trial_end):"—")+'</td></tr>';}).join("");
// activity
document.getElementById("activity").innerHTML=ACTIVITY.map(function(a){return '<div class="log-item">'+dt(a.at)+' · <b>'+actionLabel(a.action)+'</b> · '+a.workspace_code+' · '+a.admin_email+'</div>';}).join("");

function openDrawer(code){
  var o=ORGS.find(function(x){return x.workspace_code===code;});
  document.getElementById("scrim").classList.add("show");
  var dr=document.getElementById("drawer"); dr.classList.add("show");
  var members='<div class="kv"><span class="k">owner</span><span>'+o.owner_email+'</span></div><div class="kv"><span class="k">worker</span><span>jonas.'+code.toLowerCase()+'@fabflow.app</span></div>';
  var act=ACTIVITY.filter(function(a){return a.workspace_code===code;}).map(function(a){return '<div class="log-item">'+dt(a.at)+' · <b>'+actionLabel(a.action)+'</b></div>';}).join("")||'<div style="color:var(--hint);padding:10px">—</div>';
  dr.innerHTML='<button class="close" onclick="closeDrawer()">✕</button>'
   +'<h2>'+o.name+'</h2>'
   +'<div style="margin:6px 0 16px">'+pill(o)+' <span class="mono" style="font-size:12px;color:var(--hint)">'+o.workspace_code+'</span></div>'
   +'<div class="card"><div class="kv"><span class="k">Vadovas</span><span>'+o.owner_email+'</span></div>'
   +'<div class="kv"><span class="k">Planas</span><span>'+planName(o.plan)+' ('+(o.billing_interval||"—")+')</span></div>'
   +'<div class="kv"><span class="k">Programos</span><span>'+((o.apps||[]).join(", ")||"—")+'</span></div>'
   +'<div class="kv"><span class="k">Galioja iki</span><span>'+(o.current_period_end||o.trial_end?d(o.current_period_end||o.trial_end):"—")+'</span></div>'
   +'<div class="kv"><span class="k">Sukurta</span><span>'+d(o.created_at)+'</span></div></div>'
   +'<div class="act"><h4>Nemokama prieiga</h4><p>'+(o.comp?'Šis klientas turi nemokamą prieigą prie visko.':'Suteikti šiam klientui nemokamą prieigą (be Stripe).')+'</p>'+(o.comp?'<button class="btn">Atšaukti nemokamą prieigą</button>':'<button class="btn btn-primary">Suteikti nemokamą prieigą</button>')+'</div>'
   +'<div class="act"><h4>Pratęsti prieigą</h4><p>Pridėti dienų prie galiojimo (pvz. pratęsti bandymą).</p><div class="row2"><input type="number" value="14" style="width:90px"><button class="btn btn-primary">Pratęsti</button></div></div>'
   +'<div class="act"><h4>Atšaukti prenumeratą</h4><p>Atšaukti Stripe prenumeratą.</p><div class="row2"><button class="btn">Laikotarpio pabaigoje</button><button class="btn btn-danger">Nedelsiant</button></div></div>'
   +'<div class="act"><h4>Vadovo slaptažodis</h4><p>Nustatyti naują slaptažodį šio kliento vadovui.</p><div class="row2"><input type="text" placeholder="naujas slaptažodis" style="flex:1"><button class="btn btn-primary">Nustatyti</button></div></div>'
   +'<div class="act"><h4>Stripe (pinigai, sąskaitos, grąžinimai)</h4><p>Atidaryti šį klientą Stripe valdymo skydelyje.</p><button class="btn">Atidaryti Stripe ↗</button></div>'
   +'<div class="act"><h4>Komanda</h4>'+members+'</div>'
   +'<details><summary>Papildomi nustatymai (rankinis koregavimas)</summary><div class="act danger-zone"><h4 style="color:var(--red-t)">Pašalinti klientą</h4><p>Pašalina klientą iš registro (duomenys lieka). Negrįžtama.</p><button class="btn btn-danger">Pašalinti…</button></div></details>'
   +'<h4 style="margin:18px 0 6px;font-size:13px;color:var(--muted)">Šio kliento veiksmai</h4>'+act;
}
function closeDrawer(){document.getElementById("scrim").classList.remove("show");document.getElementById("drawer").classList.remove("show");}
if(/[?&]drawer=/.test(location.search)){ openDrawer((location.search.match(/[?&]drawer=([^&]+)/)||[])[1]); }
</script>
</body>
</html>
